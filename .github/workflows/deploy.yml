name: Deploy Fyne Client to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build whenever you push to the main branch
    paths:
      - 'Client/**' # ONLY runs the build if files inside the Client folder change

permissions:
  contents: write # Allows the action to write files to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Match this to your go.mod version

      - name: Install Fyne CLI Dependency
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build Fyne WebAssembly App
        run: |
          cd Client
          fyne package -os web

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: Client/wasm # Only uploads the compiled web folder
          branch: gh-pages # Deploys to a clean, isolated branch for hosting